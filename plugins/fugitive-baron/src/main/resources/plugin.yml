name: FugitiveBaron
version: ${version}
main: nest.fugitivebaron.FugitiveBaronPlugin
api-version: "1.21"
description: A paranoid fugitive tech baron encounter for Paper servers.
author: Codex
softdepend: [Citizens]
commands:
  fugitivebaron:
    description: Spawn or remove the fugitive baron NPC.
    usage: /fugitivebaron <spawn|despawn|item|radar [reset [player]|resetall]|hideout|seed|reload>
    permission: fugitivebaron.admin
permissions:
  fugitivebaron.admin:
    description: Allows managing the fugitive baron NPC.
    default: op
